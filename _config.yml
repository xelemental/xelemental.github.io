      icon: twitter-square
      color: cyan
    - url: https://github.com/xelemental
      icon: github-square
      color: purple
    - url: https://www.linkedin.com/in/subhajeet-singha-b238951a9
      icon: linkedin
      color: yellow

# Build settings
theme: jekyll-dash

plugins:
 - jekyll-feed
